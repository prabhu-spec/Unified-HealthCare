# Install: sudo cp scripts/nginx-ec2-unified.conf /etc/nginx/sites-available/healthcare
#          sudo ln -sf /etc/nginx/sites-available/healthcare /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# Serves React from /var/www/healthcare and proxies API + Socket.IO to PM2 backend.
# Browser uses ONE origin (http://34.235.222.220) — fixes telemetry WebSocket issues.

server {
    listen 80;
    server_name 34.235.222.220;

    root /var/www/healthcare;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location /health {
        proxy_pass http://127.0.0.1:5000/health;
    }
}
