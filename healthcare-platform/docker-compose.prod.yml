# Full stack: Postgres + API + web (local prod-like or small VPS)
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: healthcare
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-healthcare_dev}
      POSTGRES_DB: healthcare
    volumes:
      - healthcare_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthcare -d healthcare"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 5000
      DATABASE_URL: postgresql://healthcare:${POSTGRES_PASSWORD:-healthcare_dev}@postgres:5432/healthcare
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ENFORCE_JWT: ${ENFORCE_JWT:-false}
      CORS_ORIGIN: "*"
      LIVEKIT_URL: ${LIVEKIT_URL:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      FCM_SERVER_KEY: ${FCM_SERVER_KEY:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@example.com}
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:5000}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  healthcare_pg_data:
