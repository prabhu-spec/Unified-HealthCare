services:
  postgres:
    image: postgres:16-alpine
    container_name: healthcare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: healthcare
      POSTGRES_PASSWORD: healthcare_dev
      POSTGRES_DB: healthcare
    ports:
      - "5432:5432"
    volumes:
      - healthcare_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthcare -d healthcare"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional — local LLM via Ollama (uncomment when ready)
  # ollama:
  #   image: ollama/ollama
  #   container_name: healthcare-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama

volumes:
  healthcare_pg_data:
  # ollama_data: